var timeline = [];
  
var subject_id = Math.floor(Math.random()*100000);


var instructions1 = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
  <p style="font-size:20px;"> </p>
  <p style="font-size:20px;"> How many words can you come up with?</p>
  <p style="font-size:20px;"> Click the button below to find out.</p>
  `,
  choices: ['Start game!'],
      data: {
        typeoftrial: 'instructions',
        subject: subject_id

};    

  var animal = {
    type: jsPsychSurveyText,
    questions: [
    {prompt: '<p style="font-size:40px;">List all the ANIMALS you can in 3 minutes.</p>'}
  ]
  }

  var food = {
    //on_load: countDown(),

var AnimalResponses = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div id = "timer-box"></div>
    <div id = "response-input-box">
      <p style = "font-size:30px;">List all of the Animals you can in 3 minutes.</p>
      <div id = "responses">
        <input type = "text" class = "animal-response" autofocus />
      </div>
    </div>
    <style>
      .animal-response {
        display: block;
        margin-top: 10px;
        font-size: 20px;
        width: 300px;

      }
    </style>
    `,
  choices: [],
  trial_duration: 15000, 
  on_load: function () {
    resetCountdown();
    countDown();
    document.addEventListener ("keydown", function(event) {
      
      if (event.key == "Enter") {
        event.preventDefault();
        const currentInput = document.activeElement;
      
        if (
          currentInput.classList.contains("animal-response") && 
          currentInput.value.trim() !==""
      ) {
        currentInput.disabled = true;
        const newInput = document.createElement("input");
        newInput.type = "text";
        newInput.className = "animal-response";
      
        document.getElementById("responses").appendChild(newInput);
        newInput.focus();
        }
      }
    });
  },
  on_finish: function(data) {
    const inputElements = document.querySelectorAll(".animal-response");
    const responses = [];
    inputElements.forEach(response => {
      if (response.value.trim() !=="") {
        responses.push(response.value.trim());
      }    
    });
    data.responses = responses;
    clearInterval(timerInterval);
  }
};

function saveData(filename, filedata){
  	$.ajax({
  		type:'post',
  		cache: false,
  		url: 'save_data.php', // this is the path to the above PHP script
      //url: https://script.google.com/macros/s/AKfycbzV--xTooSkBLufMs4AnrCTdwZxVNtycTE4JNtaCze2UijXAg8/exec

  }
