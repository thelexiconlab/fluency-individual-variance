<!DOCTYPE html>
<html>
  <head>
    <title>Language experiment</title>
    <script src="https://unpkg.com/jspsych@7.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.1"></script>
    <link href="https://unpkg.com/jspsych@7.1.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <link href="timerstyle.css" rel="stylesheet" type="text/css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src = "timer.js"></script> 

  </head>
  <body>
    <div id="app"></div>
    <div id="jspsych-target"></div>
    
    <script>

// should be window.jsPsych (instead of var) if running in cognition.run
var jsPsych = initJsPsych({
  display_element: 'jspsych-target',
      on_finish: function() {
        jsPsych.data.displayData();
      },
      on_trial_start: function(trial) {
        jsPsych.data.addProperties({subject: subject_id});
      }
    });

//enables sequence ofe events in experiment 
var timeline = [];
  
//creates random subject number 
var subject_id = Math.floor(Math.random()*100000);

//formats opening instruction page 
var instructions1 = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
  <p style="font-size:20px;"> </p>
  <p style="font-size:22px;"> Hi, thank you for taking part in this experiment!</p>
    <p style="font-size:20px;"> ‎</p>
  <p style="font-size:18px;"> You will first be given a category and 3 minutes to type in as many items in that category as possible </p>
  <p style="font-size:18px;"> To submit an answer, please press enter after each INDIVIDUAL response.</p>
  <p style="font-size:20px;"> ‎</p>
  <p style="font-size:18px;"> After each category, you will take part in a spacial aramgement task where you arrange each of the words</p>
  <p style="font-size:18px;"> you input around each other based on how closely related you believe any given item is to the others..</p>
  <p style="font-size:18px;"> Once you complete this task, press the continue button to move to the next category.</p>
  <p style="font-size:18px;"> If you have any questions please ask the experimenter.</p>
  <p style="font-size:20px;"> ‎</p>
  <p style="font-size:18px;"> When you are ready to begin, please press the button below.</p>


  `,
  choices: ["Begin Experiment"],
      data: {
        typeoftrial: 'instructions',
        subject: subject_id
    }
};    

//(Every VFT category follows the same code setup as described in the Animal VFT trial)

//This sets up an empty array to record response times, which is necessary because the VFT response 
// trials are managed through custom input boxes. RT is not automatically recorded. 
var AnimalResponseTimes = []; 

//This is the array where responses are recorded to animal VFT task. 
var AnimalResponsesArray = [];
//Each input is trimmed then pushed to the animal response array, 
//while RT is pushed to the response time array. Then, a new input box is displayed.
function animalResponseInput(event) {
  if (event.key == "Enter") {
      event.preventDefault();
      const currentInput = document.activeElement;

      if (
      currentInput.classList.contains("animal-response") && 
      currentInput.value.trim() !==""
    ) {
      AnimalResponseTimes.push(Number((performance.now() - animalResponseTrialStartTime).toFixed(2))); 
      AnimalResponsesArray.push(currentInput.value.trim())
      currentInput.disabled = true;
      currentInput.classList.remove("active");

      const newInput = document.createElement("input");
      newInput.type = "text";
      newInput.className = "animal-response active";
      document.getElementById("responses").appendChild(newInput);
      newInput.focus();
    }
  }
}

//styles animal VFT page with timer and custom input box, sets trial duration, begins (and ends) timing, and listens for input
//which is handled in animalResponseInput
var AnimalResponses = {
  type: jsPsychHtmlKeyboardResponse,
  data: {task: "animal-list"},
  stimulus: `
    <div id = "timer-box"></div>
    <div id = "response-input-box">
      <p style = "font-size:30px;">List all of the Animals you can in 3 minutes.</p>
      <div id = "responses">
        <input type = "text" class = "animal-response active" autofocus />
      </div>
    </div>
    <style>
      #responses {
      position: relative;
      width: 300px;
      height: 40px; 
      }

      .animal-response {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        font-size: 20px;
        padding: 5px;
        box-sizing: border-box;
        opacity: 0.5;
      } 

      .animal-response.active {
      opacity: 1;
      z-index: 999;
      }
    </style>
    `,
  choices: [],
  trial_duration: 15000, 
  response_ends_trial: false,
    
  on_load: function () {
    resetCountdown();
    countDown();
    AnimalResponseTimes = [];
    AnimalResponsesArray = [];
    
    animalResponseTrialStartTime = performance.now();

    document.addEventListener ("keydown", animalResponseInput);
    document.querySelector(".animal-response.active")?.focus();
  },

  on_finish: function(data) {
    document.removeEventListener("keydown", animalResponseInput)
    data.task = "animal-list";
    // calculates interitem reaction time by subtracting the current time from the last time stamp
    const interitemResponseTimes = AnimalResponseTimes.map((time, i) => { 
      if (i === 0) return 0;
      return time - AnimalResponseTimes[i - 1];
    });
    
    data.response = JSON.stringify(AnimalResponsesArray);
    data.interitem_intervals = JSON.stringify(interitemResponseTimes);
    data.response_times = JSON.stringify(AnimalResponseTimes)
    clearInterval(timerInterval);
  }
};

var foodResponseTimes = [];

var foodResponsesArray = [];

function foodResponseInput(event) {
  if (event.key == "Enter") {
      event.preventDefault();
      const currentInput = document.activeElement;

    if (
      currentInput.classList.contains("food-response") && 
      currentInput.value.trim() !==""
    ) {
      foodResponseTimes.push(Number((performance.now() - foodResponseTrialStartTime).toFixed(2)));
      foodResponsesArray.push(currentInput.value.trim())
      currentInput.disabled = true;
      currentInput.classList.remove("active");

      const newInput = document.createElement("input");
      newInput.type = "text";
      newInput.className = "food-response active";
      document.getElementById("responses").appendChild(newInput);
      newInput.focus();
    }
  }
}

var FoodResponses = {
  type: jsPsychHtmlKeyboardResponse,
  data: {task: "food-list"},
  stimulus: `
    <div id = "timer-box"></div>
    <div id = "response-input-box">
      <p style = "font-size:30px;">List all of the Foods you can in 3 minutes.</p>
      <div id = "responses">
        <input type = "text" class = "food-response active" autofocus />
      </div>
    </div>
    <style>
      #responses {
      position: relative;
      width: 300px;
      height: 40px; 
      }

      .food-response {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        font-size: 20px;
        padding: 5px;
        box-sizing: border-box;
        opacity: 0.5;
      } 

      .food-response.active {
      opacity: 1;
      z-index: 999;
      }
    </style>
    `,
  choices: [],
  trial_duration: 15000, 
  
  on_load: function () {
    resetCountdown();
    countDown();
    foodResponseTimes = [];
    foodResponsesArray = [];

    foodResponseTrialStartTime = performance.now();

    document.addEventListener ("keydown", foodResponseInput);
    document.querySelector(".food-response.active")?.focus();

  },

  on_finish: function(data) {
    document.removeEventListener("keydown", foodResponseInput);

    foodExclusiveTimes = foodResponseTimes.map(time => time - foodResponseTrialStartTime);

    const interitemResponseTimes = foodExclusiveTimes.map((time, i) => { 
      if (i === 0) return 0;
      return time - foodExclusiveTimes[i - 1];
    });
    
    data.response = JSON.stringify(foodResponsesArray);
    data.interitem_intervals = JSON.stringify(interitemResponseTimes);
    data.response_times = JSON.stringify(foodResponseTimes)
    clearInterval(timerInterval);
  }
};
   
//Sets up SpAM task where participants arranges words, generated in the corresponding VFT category, 
// according to their believed similarity or relation to each other
var AnimalSpamTask = {
  type: jsPsychHtmlButtonResponse,
  stimulus: function() {
    let html = `
      <p style="font-size:24px;">
        Arrange each word to the drop area based on how related they are to one another.</p> 
      <p>A new word will appear after each previously moved word.
      </p>
      <div id="word-drop-area" style="
        margin-top: 40px;        
        height: 400px;        
        border: 2px solid #aaa;        
        padding: 10px;       
        font-size: 20px;       
        text-align: center;       
        color: #888;   
        position: relative;   
        ">Arrange here</div>     
        <style>       
          .draggable {         
          display: inline-block;         
          background: #eef;         
          padding: 10px;         
          border: 1px solid #aaa;         
          border-radius: 4px;         
          cursor: move;         
          font-size: 18px;         
          margin-bottom: 5px;       
        }     
      </style>    
    `;
      return html;
  },
  
  choices: ["Continue"], 
  button_html: '<button class = "jspsych-btn" id = "continue-button" style = "display:none;">%choice%</button>',
  data: {
    task: "AnimalSpAMArrangement"
  },
  
  
  //animal response array data is pulled/seperated, and each word is given an index.
  //The word drop area is initialized and an array is set up to track dropped words
  on_load: function() {
    const AnimalVFTResponses = jsPsych.data.get().filter({ task: "animal-list" }).last(1).values()[0];
    const AnimalWords = JSON.parse(AnimalVFTResponses.response || "[]");
    const WordDropArea = document.getElementById("word-drop-area");
    let currentIndex = 0;
    window.WordsDropped = [];

    //allows dragging and tracks mouse press onto a word (or rectangle the word is in)
    function Draggable(element, onFirstMove) {
      let offsetX, offsetY;
      let currentlyDragging = false;
      let hasMoved = false;
    
      element.addEventListener("mousedown", (event) => {
        currentlyDragging = true;
        const rectangle = element.getBoundingClientRect();
        offsetX = event.clientX - rectangle.left;
        offsetY = event.clientY - rectangle.top;
        element.style.cursor = "grabbing";

        document.addEventListener("mousemove", OnMouseMove);
        document.addEventListener("mouseup", OnMouseUp);

        event.preventDefault();
      });

      //tracks mouse movement of the rectangle the word is in and calculates where it moves
      function OnMouseMove (event) {
        if (!currentlyDragging) return;

        const dropRectangle = WordDropArea.getBoundingClientRect();
        let left = event.clientX - dropRectangle.left - offsetX;
        let top = event.clientY - dropRectangle.top - offsetY;

        left = Math.max(0, Math.min(left, dropRectangle.width - element.offsetWidth));
        top = Math.max(0, Math.min(top, dropRectangle.height - element.offsetHeight));

        element.style.left = left + "px"
        element.style.top = top + "px"
    
        if (!hasMoved) {
          hasMoved = true
          if (typeof onFirstMove === "function") {
            onFirstMove();
          }
        }
      }
      
      //tracks when mouse is no longer pressing on word box and records words positions
      function OnMouseUp () {
        if (currentlyDragging) {
          currentlyDragging = false;
          element.style.cursor = "grab";
          document.removeEventListener("mousemove", OnMouseMove)
          document.removeEventListener("mouseup", OnMouseUp)

          window.WordsDropped.push({
            word: element.textContent,
            id: element.id,
            left: element.style.left,
            top: element.style.top
          });
          
          if (window.WordsDropped.length === AnimalWords.length) {
            const button = document.getElementById("continue-button");
            if (button) button.style.display = "inline-block";
          }

        }
      }
    }
      //handles the display of the next word by establishing placement and calling next index of animal VFT responses
      function NextWord() {
      if (currentIndex >= AnimalWords.length) return;

      const words = AnimalWords[currentIndex];
      const wordDiv = document.createElement("div");
      wordDiv.textContent = words;
      wordDiv.className = "draggable";
      wordDiv.id = `word-${currentIndex}`;
      wordDiv.style.position = "absolute";
      wordDiv.style.left = "30px";
      wordDiv.style.top = "30px"
      
      WordDropArea.appendChild(wordDiv);
      Draggable(wordDiv, () => {
        currentIndex ++; 
        setTimeout(() => {
          NextWord(); 
        }, 2000); //2 second delay before next box appears
      });
    }

    NextWord();
  },  

 on_finish: function (data) {
    data.droppedwords = window.WordsDropped || [];
  }
};


  var endexperiment = {
    on_load: resetCountdown,
      type: jsPsychHtmlButtonResponse,
      stimulus: `<p>Thank you for participating! </p>
      <p> Please click <a href="https://bit.ly/3t1aLGU" target="_blank" rel="noopener noreferrer">here</a> to access the debriefing form and know more about our research.</p>
      <p> Please click the button below to finish the experiment and save your data.</p>
      <p> IMPORTANT: Please do not leave this page without clicking the button below.</p>
        `,
      choices: ['Finish and Save Data']
  };


  var save_data = {
    type: jsPsychCallFunction,
    func: function(){saveData(subject_id+".csv",
      jsPsych.data.get().csv())}
}


function saveData(filename, filedata){
  	$.ajax({
  		type:'post',
  		cache: false,
  		url: 'save_data.php', // this is the path to the above PHP script
      //url: https://script.google.com/macros/s/AKfycbzV--xTooSkBLufMs4AnrCTdwZxVNtycTE4JNtaCze2UijXAg8/exec
  		data: {filename: filename, filedata: filedata}})
  }


  timeline.push(instructions1);
  timeline.push(AnimalResponses);
  timeline.push(AnimalSpamTask)
  timeline.push(FoodResponses);
  timeline.push(save_data);
  timeline.push(endexperiment);

  
  jsPsych.run(timeline);


    </script>
  </body>
</html>
