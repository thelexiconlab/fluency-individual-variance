<!DOCTYPE html>
<html>
  <head>
    <title>Language experiment</title>
    <script src="https://unpkg.com/jspsych@7.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.1"></script>
    <link href="https://unpkg.com/jspsych@7.1.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <link href="timerstyle.css" rel="stylesheet" type="text/css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src = "timer.js"></script> 

  </head>
  <body>
    <div id="app"></div>
    <div id="jspsych-target"></div>
    
    



    <script>

var jsPsych = initJsPsych({
  display_element: 'jspsych-target',
      on_finish: function() {
        jsPsych.data.displayData();
      },
      on_trial_start: function(trial) {
        jsPsych.data.addProperties({subject: subject_id});
      }
    });



var timeline = [];
  
var subject_id = Math.floor(Math.random()*100000);


var instructions1 = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
  <p style="font-size:20px;"> </p>
  <p style="font-size:20px;"> How many words can you come up with?</p>
  <p style="font-size:20px;"> Click the button below to find out.</p>
  `,
  choices: ['Start game!'],
      data: {
        typeoftrial: 'instructions',
        subject: subject_id
    }
};    



var AnimalResponsesArray = [];

function animalResponseInput(event) {
  if (event.key == "Enter") {
      event.preventDefault();
      const currentInput = document.activeElement;
      
    if (
      currentInput.classList.contains("animal-response") && 
      currentInput.value.trim() !==""
    ) {
      AnimalResponsesArray.push(currentInput.value.trim())
      currentInput.disabled = true;
      currentInput.classList.remove("active");

      const newInput = document.createElement("input");
      newInput.type = "text";
      newInput.className = "animal-response active";
      document.getElementById("responses").appendChild(newInput);
      newInput.focus();
    }
  }
}

// create event handler for each response

var AnimalResponses = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div id = "timer-box"></div>
    <div id = "response-input-box">
      <p style = "font-size:30px;">List all of the Animals you can in 3 minutes.</p>
      <div id = "responses">
        <input type = "text" class = "animal-response active" autofocus />
      </div>
    </div>
    <style>
      #responses {
      position: relative;
      width: 300px;
      height: 40px; 
      }

      .animal-response {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        font-size: 20px;
        padding: 5px;
        box-sizing: border-box;
        opacity: 0.5;
      } 

      .animal-response.active {
      opacity: 1;
      z-index: 999;
      }
    </style>
    `,
  choices: [],
  trial_duration: 15000, 
  response_ends_trial: false,
    on_load: function () {
    resetCountdown();
    countDown();
    AnimalResponsesArray = [];
    document.addEventListener ("keydown", animalResponseInput);
  },

  //try updating formatting for every new event so that it is in the same place as the old input and the box is color filled
  on_finish: function(data) {
    document.removeEventListener("keydown", animalResponseInput)
    data.response = JSON.stringify(AnimalResponsesArray);
    console.log("Animal Responses:", AnimalResponsesArray);
    clearInterval(timerInterval);
  }
};
  
var foodResponsesArray = [];

function foodResponseInput(event) {
  if (event.key == "Enter") {
      event.preventDefault();
      const currentInput = document.activeElement;
      
    if (
      currentInput.classList.contains("food-response") && 
      currentInput.value.trim() !==""
    ) {
      foodResponsesArray.push(currentInput.value.trim())
      currentInput.disabled = true;
      currentInput.classList.remove("active");

      const newInput = document.createElement("input");
      newInput.type = "text";
      newInput.className = "food-response active";
      document.getElementById("responses").appendChild(newInput);
      newInput.focus();
    }
  }
}




var FoodResponses = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div id = "timer-box"></div>
    <div id = "response-input-box">
      <p style = "font-size:30px;">List all of the Foods you can in 3 minutes.</p>
      <div id = "responses">
        <input type = "text" class = "food-response active" autofocus />
      </div>
    </div>
    <style>
      #responses {
      position: relative;
      width: 300px;
      height: 40px; 
      }

      .food-response {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        font-size: 20px;
        padding: 5px;
        box-sizing: border-box;
        opacity: 0.5;
      } 

      .food-response.active {
      opacity: 1;
      z-index: 999;
      }
    </style>
    `,
  choices: [],
  trial_duration: 15000, 
  on_load: function () {
    resetCountdown();
    countDown();
    foodResponsesArray = [];
    document.addEventListener ("keydown", foodResponseInput);
  },
  //try updating formatting for every new event so that it is in the same place as the old input and the box is color filled
  on_finish: function(data) {
    document.removeEventListener("keydown", foodResponseInput)
    data.response = JSON.stringify(foodResponsesArray);
    console.log("Food Responses:", foodResponsesArray);
    clearInterval(timerInterval);
  }
};
   
  
  var endexperiment = {
    on_load: resetCountdown,
      type: jsPsychHtmlButtonResponse,
      stimulus: `<p>Thank you for participating! </p>
      <p> Please click <a href="https://bit.ly/3t1aLGU" target="_blank" rel="noopener noreferrer">here</a> to access the debriefing form and know more about our research.</p>
      <p> Please click the button below to finish the experiment and save your data.</p>
      <p> IMPORTANT: Please do not leave this page without clicking the button below.</p>
        `,
      choices: ['Finish and Save Data']
  };

  // add everything to timeline

  


  var save_data = {
    type: jsPsychCallFunction,
    func: function(){saveData(subject_id+".csv",
      jsPsych.data.get().csv())}
}

function saveData(filename, filedata){
  	$.ajax({
  		type:'post',
  		cache: false,
  		url: 'save_data.php', // this is the path to the above PHP script
      //url: https://script.google.com/macros/s/AKfycbzV--xTooSkBLufMs4AnrCTdwZxVNtycTE4JNtaCze2UijXAg8/exec
  		data: {filename: filename, filedata: filedata}})
  }

  print(foodResponsesArray)
  print(AnimalResponsesArray)
  timeline.push(instructions1);
  timeline.push(AnimalResponses);
  timeline.push(FoodResponses);
  timeline.push(save_data);
  timeline.push(endexperiment);

  
  jsPsych.run(timeline);




    </script>
  </body>
</html>
