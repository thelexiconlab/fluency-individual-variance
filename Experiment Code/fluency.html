<!DOCTYPE html>
<html>
  <head>
    <title>Language experiment</title>
    <script src="https://unpkg.com/jspsych@7.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-select@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@2.1.0"></script>

    <link href="https://unpkg.com/jspsych@7.1.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <link href="timerstyle.css" rel="stylesheet" type="text/css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src = "timer.js"></script> 
    <script src="vftspamdemo.js"></script>
    <script src="instructions.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="jspsych-target"></div>
    <script>

// should be window.jsPsych (instead of var) if running in cognition.run
var jsPsych = initJsPsych({
  display_element: 'jspsych-target',
      on_finish: function() {
        jsPsych.data.displayData();
      },
      on_trial_start: function(trial) {
        jsPsych.data.addProperties({});
      }
    });

//creates random subject number + letter code
var subject_id = createSubjectID();

//enables sequence of events in experiment 
var timeline = [];

function createSubjectID(length = 8) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let subjectCode = "";
  for (let i = 0; i < length; i++){
    subjectCode += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return subjectCode;
}

jsPsych.data.addProperties({
    subject: subject_id,
});

var likert_scale = [
  "None",
  "<30 min/week",
  "30-90 min/week",
  "1.5-3 hours/week",
  "3-6 hours/week",
  "6-10 hours/week",
  ">10 hours/week"
];

var long_form_exposure = {
  type: jsPsychSurveyLikert,
  preamble: `<p style="font-size:18px;"> In a typical week, how much time do you spend reading or listening to the following?</p>`,
  questions: [
    {prompt: "News articles (online or print)", name: 'NewsArticles', labels: likert_scale, required: true},
    {prompt: "Fiction books (print, ebook, or audiobook)", name: 'FictionBooks', labels: likert_scale, required: true},
    {prompt: "Non-fiction books (print, ebook, or audiobook)", name: 'NonFictionBooks', labels: likert_scale, required: true},
    {prompt: "Long-form essays/blogs/newsletters", name: 'EssaysBlogsNewsletters', labels: likert_scale, required: true},
    {prompt: "Podcasts", name: 'Podcasts', labels: likert_scale, required: true},
  ],
  randomize_question_order: false,
  data: {
       typeoftrial: 'long_form_exposure',
   },
   on_finish: function(data) {
    const responses = data.response;
    data.long_NewsArticles = responses.NewsArticles;
    data.long_FictionBooks = responses.FictionBooks;
    data.long_NonFictionBooks = responses.NonFictionBooks;
    data.long_EssaysBlogsNewsletters = responses.EssaysBlogsNewsletters;
    data.long_Podcasts = responses.Podcasts;
   }
};

var social_media_exposure = {
  type: jsPsychSurveyLikert,
  preamble: `<p style="font-size:18px;">  In a typical week, how much time do you spend reading or listening <br> to content on the following platforms <br>(not just viewing images or short clips without speech/text)?</p>`,
  questions: [
    {prompt: "X/Twitter", name: 'Twitter', labels: likert_scale, required: true},
    {prompt: "Facebook", name: 'Facebook', labels: likert_scale, required: true},
    {prompt: "TikTok (spoken or captioned content)", name: 'TikTok', labels: likert_scale, required: true},
    {prompt: "Reddit", name: 'Reddit', labels: likert_scale, required: true},
    {prompt: "YouTube (videos where you attend to speech or dialogue)", name: 'YouTube', labels: likert_scale, required: true},
    {prompt: "Instagram (captions, stories, reels with speech/text)", name: 'Instagram', labels: likert_scale, required: true},
    {prompt: "Snapchat (stories/messages with written or spoken language)", name: 'Snapchat', labels: likert_scale, required: true},
  ],
  randomize_question_order: false,
  data: {
       typeoftrial: 'social_media_exposure',
   },
   on_finish: function(data) {
    const responses = data.response;
    data.social_Twitter = responses.Twitter;
    data.social_Facebook = responses.Facebook;
    data.social_TikTok = responses.TikTok;
    data.social_Reddit = responses.Reddit;
    data.social_YouTube = responses.YouTube;
    data.social_Instagram = responses.Instagram;
    data.social_Snapchat = responses.Snapchat;
   }
};

const VFTTask = (d,p,t) => buildVFTTask(d,p,t,false);
const VFTTaskContinueButton = (d,p,t) => buildVFTTask(d,p,t,true);

   
const makeVFTLoop = (trial, domain) => ({
  timeline: [trial],
  loop_function: () => {
    const last = jsPsych.data.get().filter({task:"VFT",domain}).last(1).values()[0];
    const responses = JSON.parse(last?.tagged_responses || "[]");
    if (!responses.length) {
      alert("You did not input any responses. Please try again.");
      return true;
    }
    return false;
  }
});


function VFTContinue(domain, prompt, time = 10000) {
  return makeVFTLoop(VFTTaskContinueButton(domain, prompt, time),domain);
}

function VFTmaintask(domain, prompt, time = 10000) {
  return makeVFTLoop(VFTTask(domain, prompt, time),domain);
}

function VFT_category_interest(domain, displayName = domain) {
  const displayUpper = displayName.toUpperCase();
  return {
    type: jsPsychHtmlSliderResponse,
    stimulus: `<p>How interesting do you find the category <strong>${displayUpper}</strong>?</p>`,
    labels: ["0 (not interesting at all)", "50 (moderately interesting)", "100 (extremely interesting)"],
    min: 0, max: 100, start: 50, step: 1,
    require_movement: true,
    data: {
      typeoftrial: "VFT_category_interest",
      domain: domain
    },
    on_finish: function (data) {
      data.category_interest = data.response;
    }
  };
}

function VFT_category_response_estimate(domain, displayName = domain) {
  const displayUpper = displayName.toUpperCase();
  return {
    type: jsPsychSurveyHtmlForm,
    preamble: `<p><br><br>How many <strong>${displayUpper}</strong> do you think you could produce within a minute?</p>`,
    html: `<p><input name="estimate" type="number" min="0" step="1" placeholder="type numeric value here" required style="font-size: 14px; width: 200px;"/></p>`,
    data: {
      typeoftrial: "VFT_estimate",
      domain: domain,
    },
    on_load: function() {
      const input = jsPsych.getDisplayElement().querySelector('input[name="estimate"]');
      if (input) input.focus(); // automatically put cursor in the box
    },
    on_finish: function(data) {
      data.response = data.response.estimate;
    }
  };
}

  var totaltime = {
    type: jsPsychCallFunction,
      func: function() {
        var total_ms = jsPsych.getTotalTime();
        var total_minutes = total_ms / 60000;

        jsPsych.data.addProperties({
        total_time_ms: total_ms,
        total_time_minutes: total_minutes
        });
      }
    };

var compensationPage = {
  type: jsPsychHtmlButtonResponse,
  stimulus: function() {
    return `
      <h2>Thank you for participating! You have completed the experiment. </h2>
      <p>Your completion code is </p>
      <p style = "font-size: 28px; font-weight: bold; letter-spacing: 2px;">${subject_id}</p>
      <p>To receive compensation/credit, please follow the link below to the compensation form and copy and paste the code above.</p>
      <p>
        <a href = "https://docs.google.com/forms/d/e/1FAIpQLSc8UGDrLaJgDIt7itpYr5u4Mt0LjjfXINBq9XZmaVx0b_rVlg/viewform?usp=header"
          target = "_blank"
          rel = "noopener noreferrer">
          Open compensation form
        </a>
      </p>
      <p>  After clicking the link, <b> please return to this page</b> and click the button below to finish the experiment and save your data.</p>
      <p> You can also click <a href="https://drive.google.com/file/d/1yD8wzNc2l6z4PzHAHSpVsnpay0790VCZ/view" target="_blank" rel="noopener noreferrer">here</a> to access the debriefing form and know more about our research.</p>
      <p> <b>IMPORTANT: Please do not leave this page without clicking the button below.</b></p>
      
    `; 
  },

  choices: ["Finish and Save Data"],

  data: {
    typeoftrial: "compensation",
    completion_code: subject_id
  }
};

var demographics = {
    timeline: [demographics_intro, demographics_survey1, demographics_survey2, demographics_survey3, follow_up_procedure,demographics_language_followup,additional_info_question]
};

// BUILDING THE TIMELINE

timeline.push(
  language_exposure_instructions,
  long_form_exposure,
  social_media_exposure,
  interestssurveyinstructions,
  VFTContinue("subreddits", "Type in the Subreddits you frequently engage with", 180000),
  VFTContinue("interest", "Type in your general interests when you consume language content", 180000),
  maininstructions,
  VFTInstructions,
  SpAMInstructions,
  startInstructions
);

const shuffle = arr => arr.sort(() => Math.random() - 0.5);

const domains = [
  { id: "animals", label: "Animals" },
  { id: "college_majors", label: "College Majors" },
  { id: "sportspersons", label: "Sportspersons" },
  { id: "musicians", label: "Musicians" },
  { id: "authors", label: "Authors" },

];

const trials = domains.map((d, index) => {
  const block = [
    VFT_category_interest(d.id, d.label),
    VFT_category_response_estimate(d.id, d.label),
    VFTmaintask(d.id, `Name as many <strong>${d.label.toUpperCase()}</strong> as you can.`, 60000),
    SpamTask(d.id)
  ];

  // Only add betweenVFTAndSpAMInstructions for the first domain
  if (index === 0) {
    block.splice(3, 0, betweenVFTAndSpAMInstructions); // insert before SpamTask
  }

  return block;
});


shuffle(trials);

trials.forEach((block, i) => {
  timeline.push(...block);
  if (i < trials.length - 1) timeline.push(afterSpAMInstructions);
});

timeline.push(demographics, compensationPage, totaltime);

jsPsych.run(timeline);


    </script>
  </body>
</html>
